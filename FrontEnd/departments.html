<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div id="id">
        <div class="min-h-screen bg-slate-50 flex">
            <aside class="fixed left-0 top-0 h-full z-30 flex flex-col transition-all duration-300 w-[260px]" style="background: linear-gradient(rgb(30, 41, 59) 0%, rgb(15, 23, 42) 100%);">
                <div class="flex items-center gap-3 px-4 py-5 border-b border-white/10 ">
                    <div class="w-10 h-10 flex items-center justify-center flex-shrink-0">
                        <img alt="HR System Logo" class="w-10 h-10 object-contain rounded-lg" src="https://public.readdy.ai/ai/img_res/ca025dc2-66b8-45cb-9b91-c50b6f856625.png">
                    </div>
                    <div>
                        <p class="text-white font-bold text-base leading-tight whitespace-nowrap" style="font-family: Inter, sans-serif;"> HR Manager</p>
                        <p class="text-slate-400 text-xs">Sistema de RRHH</p>
                    </div>
                </div>
                <nav class="flex-1 px-3 py-4 overflow-y-auto">
                    <ul class="space-y-1">
                        <li>
                            <a class="flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 cursor-pointer group text-slate-400 hover:bg-slate-700/60 hover:text-white" href="index.html" aria-current="page">
                                <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
                                    <i class="ri-dashboard-3-line text-lg"></i>
                                </div>
                                <span class="text-sm font-medium whitespace-nowrap">Dashboard</span>
                            </a>
                        </li>
                        <li>
                            <a class="flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 cursor-pointer group text-slate-400 hover:bg-slate-700/60 hover:text-white" href="directory.html" aria-current="page">
                                <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
                                    <i class="ri-team-line text-lg"></i>
                                </div>
                                <span class="text-sm font-medium whitespace-nowrap">Directorio de Empleados</span>
                            </a>
                        </li>
                        <li>
                            <a class="flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 cursor-pointer group bg-emerald-500 text-white shadow-lg" href="departments.html" aria-current="page">
                                <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
                                    <i class="ri-team-line text-lg"></i>
                                </div>
                                <span class="text-sm font-medium whitespace-nowrap">Departamentos</span>
                                <div class="ml-auto w-1.5 h-1.5 rounded-full bg-white/70"></div>
                            </a>
                        </li>
                        <li>
                            <a class="flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 cursor-pointer group text-slate-400 hover:bg-slate-700/60 hover:text-white" href="salarios.html" aria-current="page">
                                <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
                                    <i class="ri-history-line text-lg"></i>
                                </div>
                                <span class="text-sm font-medium whitespace-nowrap">Historial laboral & Salarios</span>
                            </a>
                        </li>
                        <li>
                            <a class="flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 cursor-pointer group text-slate-400 hover:bg-slate-700/60 hover:text-white" href="incidentes.html" aria-current="page">
                                <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
                                    <i class="ri-alert-line text-lg"></i>
                                </div>
                                <span class="text-sm font-medium whitespace-nowrap">Incidencias</span>
                            </a>
                        </li>
                        <li>
                            <a class="flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200 cursor-pointer group text-slate-400 hover:bg-slate-700/60 hover:text-white" href="ajustes.html" aria-current="page">
                                <div class="w-5 h-5 flex items-center justify-center flex-shrink-0">
                                    <i class="ri-settings-3-line text-lg"></i>
                                </div>
                                <span class="text-sm font-medium whitespace-nowrap">Ajustes</span>
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="border-t border-white/10 p-4 ">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-emerald-500 flex items-center justify-center flex-shrink-0">
                            <span class="text-white text-sm font-bold">A</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-white text-sm font-semibold truncate">Admin User</p>
                            <p class="text-slate-400 text-xs truncate">HR Administrator</p>
                        </div>
                        <button class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-white cursor-pointer">
                            <i class="ri-arrow-left-s-line text-lg"></i>
                        </button>
                    </div>
                </div>
            </aside>
            <div class="flex-1 flex flex-col min-h-screen transition-all duration-300" style="margin-left: 260px;">
                <header class="fixed top-0 right-0 z-20 bg-white border-b border-slate-100 flex items-center px-6 transition-all duration-300" style="left: 260px; height: 70px;">
                    <div class="flex-1">
                        <h2 class="text-xl font-bold text-slate-800" style="font-family: Inter, sans-serif;">Departamentos</h2>
                        <p class="text-xs text-slate-400">Gestión de departamentos</p>
                    </div>
                    <div class="relative mx-6 hidden md:block">
                        <div class="w-5 h-5 flex items-center justify-center absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="ri-search-line text-sm"></i>
                        </div>
                        <input placeholder="Buscar empleados, departamentos..." class="bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 w-72 transition-all" type="text" value="">
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 hover:bg-slate-100 text-slate-600 cursor-pointer transition-colors relative">
                                <i class="ri-notification-3-line text-lg"></i>
                                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
                            </button>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center cursor-pointer">
                            <span class="text-white text-sm font-bold">A</span>
                        </div>
                    </div>
                </header>
                <main class="flex-1 p-6 mt-[70px] overflow-auto">
                    <div class="space-y-5">
                        <div class="fixed top-5 right-5 z-[100] flex flex-col gap-2"></div>
                        <div class="flex items-center justify-between">
                            <p id="departmentsCount" class="text-sm text-slate-500">Cargando departamentos...</p>
                            <button class="flex items-center gap-2 bg-emerald-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-emerald-600 cursor-pointer transition-colors whitespace-nowrap">
                                <div class="w-4 h-4 flex items-center justify-center">
                                    <i class="ri-add-line"></i>
                                </div>
                                Nuevo Departamento
                            </button>
                        </div>
                        <div id="departmentsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        (() => {
            const API_BASE_URL = 'http://localhost:3000';
            const departmentsCount = document.getElementById('departmentsCount');
            const departmentsGrid = document.getElementById('departmentsGrid');

            const borderColors = [
                'rgb(245, 158, 11)',
                'rgb(16, 185, 129)',
                'rgb(139, 92, 246)',
                'rgb(239, 68, 68)',
                'rgb(59, 130, 246)',
                'rgb(6, 182, 212)',
                'rgb(249, 115, 22)',
                'rgb(236, 72, 153)',
                'rgb(20, 184, 166)'
            ];

            const formatCurrency = (value) => new Intl.NumberFormat('es-MX', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            }).format(value || 0);

            const createDepartmentCard = (department, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl border border-slate-100 p-6 hover:border-slate-200 transition-all';
                card.style.borderLeft = `4px solid ${borderColors[index % borderColors.length]}`;
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <h3 class="font-bold text-slate-800 text-lg">${department.dept_name}</h3>
                            <span class="text-xs text-slate-400 font-mono">${department.dept_no}</span>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2 text-sm text-slate-600">
                            <div class="w-5 h-5 flex items-center justify-center text-slate-400">
                                <i class="ri-team-line"></i>
                            </div>
                            <span>${department.total_employees} empleados</span>
                        </div>
                        <div class="flex items-center gap-2 text-sm text-slate-600">
                            <div class="w-5 h-5 flex items-center justify-center text-slate-400">
                                <i class="ri-user-star-line"></i>
                            </div>
                            <span>${department.current_manager}</span>
                        </div>
                        <div class="flex items-center gap-2 text-sm text-slate-600">
                            <div class="w-5 h-5 flex items-center justify-center text-slate-400">
                                <i class="ri-money-dollar-circle-line"></i>
                            </div>
                            <span>Salario prom. <strong>${formatCurrency(department.average_salary)}</strong></span>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-5">
                        <button class="flex-1 border border-slate-200 text-slate-600 rounded-lg py-2 text-sm font-medium hover:bg-slate-50 cursor-pointer transition-colors whitespace-nowrap flex items-center justify-center gap-1.5">
                            <i class="ri-group-line text-sm"></i>
                            Ver Detalles
                        </button>
                        <button class="w-9 h-9 flex items-center justify-center border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-500 cursor-pointer transition-colors flex-shrink-0">
                            <i class="ri-edit-line text-sm"></i>
                        </button>
                    </div>
                `;
                return card;
            };

            const loadDepartments = async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/departments`);

                    if (!response.ok) {
                        throw new Error('No se pudieron obtener los departamentos');
                    }

                    const departments = await response.json();
                    departmentsGrid.innerHTML = '';

                    departments.forEach((department, index) => {
                        departmentsGrid.appendChild(createDepartmentCard(department, index));
                    });

                    departmentsCount.textContent = `${departments.length} Departamentos Activos`;
                } catch (error) {
                    console.error('Error cargando departamentos:', error);
                    departmentsGrid.innerHTML = `
                        <div class="col-span-full bg-white rounded-2xl border border-slate-100 p-8 text-center text-sm text-red-500">
                            No se pudieron cargar los departamentos.
                        </div>
                    `;
                    departmentsCount.textContent = 'No se pudieron cargar los departamentos';
                }
            };

            loadDepartments();
        })();
    </script>
</body>
</html>
